<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>¿Quieres ser mi novia? ❤️</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins',sans-serif;
}

body{
    overflow:hidden;
    background:linear-gradient(135deg,#ffb6d9,#ffd6e8,#fff0f6);
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    position:relative;
}

/* Corazones */
.heart{
    position:absolute;
    color:#ff4f87;
    animation:fall linear infinite;
    user-select:none;
    opacity:.8;
}

@keyframes fall{
    from{
        transform:translateY(-10vh);
    }
    to{
        transform:translateY(110vh);
    }
}

.container{
    text-align:center;
    background:rgba(255,255,255,.25);
    backdrop-filter:blur(12px);
    padding:45px;
    border-radius:25px;
    box-shadow:0 20px 40px rgba(0,0,0,.18);
    z-index:5;
}

h1{
    font-size:3rem;
    color:#ff2d6f;
    margin-bottom:15px;
}

#phrase{
    font-size:1.3rem;
    margin-bottom:40px;
    color:#555;
    transition:.3s;
}

.buttons{
    display:flex;
    justify-content:center;
    align-items:center;
    gap:20px;
}

button{
    border:none;
    cursor:pointer;
    transition:.3s;
    border-radius:15px;
    font-weight:bold;
}

#yes{
    background:#ff3f86;
    color:white;
    padding:18px 45px;
    font-size:24px;
}

#yes:hover{
    transform:scale(1.08);
}

#no{
    background:#ddd;
    color:#444;
    padding:18px 40px;
    font-size:24px;
}

#result{
    display:none;
    animation:appear .7s;
}

@keyframes appear{
    from{
        transform:scale(.7);
        opacity:0;
    }
    to{
        transform:scale(1);
        opacity:1;
    }
}

#result h2{
    color:#ff2d6f;
    font-size:3rem;
    margin-bottom:20px;
}

#result p{
    font-size:1.4rem;
    color:#555;
}

canvas{
    position:fixed;
    inset:0;
    pointer-events:none;
}
</style>
</head>

<body>

<canvas id="canvas"></canvas>

<div class="container" id="main">

<h1>¿Quieres ser mi novia? 💖</h1>

<p id="phrase">Prometo hacerte muy feliz. 🥺❤️</p>

<div class="buttons">
<button id="yes">Sí ❤️</button>
<button id="no">No 💔</button>
</div>

</div>

<div id="result">

<h2>¡¡SABÍA QUE DIRÍAS QUE SÍ!! ❤️🥹</h2>

<p>
Ahora oficialmente eres mi novia 💕<br><br>
Te prometo muchos besitos, risas, metidas de dedos y muchísimo amor. 🌹
</p>

</div>

<script>

const phrases=[
"¿Segura? 🥺",
"Piénsalo otra vez ❤️",
"No seas malita 😭",
"El botón de Sí se ve muy bonito 👉",
"Creo que te equivocaste 🤭",
"Una oportunidad más 🥹",
"¿Y si pruebas el otro? ❤️",
"Prometo consentirte 🌹",
"Ya casi no queda botón de No 😂",
"Bueno... creo que solo queda decir Sí 💕"
];

const no=document.getElementById("no");
const yes=document.getElementById("yes");
const phrase=document.getElementById("phrase");

let size=24;
let clicks=0;

no.onclick=()=>{

clicks++;

phrase.innerHTML=phrases[Math.min(clicks-1,phrases.length-1)];

size+=10;

yes.style.fontSize=size+"px";
yes.style.padding=(18+clicks*5)+"px "+(45+clicks*12)+"px";

no.style.transform=`scale(${Math.max(.25,1-clicks*0.08)})`;

if(clicks>12){
no.style.display="none";
}

}

yes.onclick=()=>{

document.getElementById("main").style.display="none";
document.getElementById("result").style.display="block";

confetti();

}

// corazones

function createHeart(){

const h=document.createElement("div");
h.className="heart";
h.innerHTML="❤";

h.style.left=Math.random()*100+"vw";
h.style.fontSize=(15+Math.random()*30)+"px";
h.style.animationDuration=(4+Math.random()*5)+"s";

document.body.appendChild(h);

setTimeout(()=>h.remove(),9000);

}

setInterval(createHeart,250);


// Confetti

const canvas=document.getElementById("canvas");
const ctx=canvas.getContext("2d");

canvas.width=innerWidth;
canvas.height=innerHeight;

window.onresize=()=>{
canvas.width=innerWidth;
canvas.height=innerHeight;
}

function confetti(){

let pieces=[];

for(let i=0;i<250;i++){

pieces.push({

x:Math.random()*canvas.width,
y:-20,
r:Math.random()*8+4,
dx:(Math.random()-.5)*6,
dy:Math.random()*4+3,
c:`hsl(${Math.random()*360},100%,60%)`

});

}

function draw(){

ctx.clearRect(0,0,canvas.width,canvas.height);

pieces.forEach(p=>{

ctx.fillStyle=p.c;
ctx.beginPath();
ctx.arc(p.x,p.y,p.r,0,Math.PI*2);
ctx.fill();

p.x+=p.dx;
p.y+=p.dy;

});

pieces=pieces.filter(p=>p.y<canvas.height+30);

if(pieces.length){
requestAnimationFrame(draw);
}

}

draw();

}

</script>

</body>
</html>
